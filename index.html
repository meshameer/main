<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farooks — Home</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #c9a96e;
      --accent-light: #e8cc9a;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
    }

    /* Monogram */
    .monogram {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 40px;
      background: var(--surface);
    }

    .monogram span {
      font-size: 2.2rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* Heading */
    h1 {
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      font-weight: normal;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .dot {
      color: var(--accent);
    }

    .tagline {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 12px;
      margin-bottom: 56px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 56px;
      opacity: 0.6;
    }

    /* Links */
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 80px;
    }

    nav a {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }

    nav a:hover {
      border-color: var(--accent);
      color: var(--accent-light);
    }

    /* Footer */
    footer {
      position: absolute;
      bottom: 28px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.78rem;
      color: var(--border);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <div class="monogram">
    <span>F</span>
  </div>

  <h1>Farooks<span class="dot">.</span></h1>
  <p class="tagline">Home of the Farooks</p>

  <div class="divider"></div>

  <nav>
    <a href="https://shameer.farooks.com">Shameer</a>
    <a href="https://anvar.farooks.com">Anvar</a>
    <a href="https://ruksana.farooks.com">Ruksana</a>
  </nav>

  <footer>farooks.com</footer>

</body>
</html>
